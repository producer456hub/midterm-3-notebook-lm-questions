<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Midterm 3 — Bones, Joints & Muscles Practice Test</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a;
    --ink:#e8ebf1; --muted:#9aa3b2; --accent:#5b8cff; --accent2:#3a6df0;
    --good:#34c77b; --good-bg:#13301f; --bad:#ff5d6c; --bad-bg:#33161b;
    --gold:#ffcf5c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:0 0 80px;
  }
  header{
    background:linear-gradient(135deg,#1b2030,#12151d);
    border-bottom:1px solid var(--line);
    padding:26px 20px;
  }
  .wrap{max-width:820px;margin:0 auto;padding:0 18px}
  h1{margin:0;font-size:24px;letter-spacing:.2px}
  .sub{color:var(--muted);margin-top:6px;font-size:14px}
  .card{
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:22px; margin:18px 0;
  }
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  label.opt-toggle{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:14px;cursor:pointer}
  select,button{font:inherit}
  select{
    background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:9px;padding:9px 12px;
  }
  button{
    background:var(--accent2);color:#fff;border:none;border-radius:10px;
    padding:11px 18px;font-weight:600;cursor:pointer;transition:.15s;
  }
  button:hover{background:var(--accent)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  button.ghost:hover{background:var(--panel2)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .q{
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:20px; margin:14px 0;
  }
  .q-head{display:flex;gap:10px;align-items:baseline;margin-bottom:12px}
  .q-num{font-weight:700;color:var(--accent)}
  .tag{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:2px 9px}
  .q-text{font-weight:500}
  .choices{list-style:none;margin:14px 0 0;padding:0;display:grid;gap:9px}
  .choice{
    display:flex;gap:11px;align-items:flex-start;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;cursor:pointer;transition:.12s;
  }
  .choice:hover{border-color:var(--accent)}
  .choice.sel{border-color:var(--accent);background:#1a2336}
  .choice.correct{border-color:var(--good);background:var(--good-bg)}
  .choice.wrong{border-color:var(--bad);background:var(--bad-bg)}
  .choice input{margin-top:4px;accent-color:var(--accent)}
  .letter{font-weight:700;color:var(--muted);min-width:18px}
  .choice.correct .letter{color:var(--good)}
  .choice.wrong .letter{color:var(--bad)}
  .verdict{margin-top:10px;font-size:14px;font-weight:600}
  .verdict.ok{color:var(--good)}
  .verdict.no{color:var(--bad)}
  .bar{
    position:sticky;bottom:0;z-index:5;
    background:rgba(15,17,21,.94);backdrop-filter:blur(6px);
    border-top:1px solid var(--line);padding:14px 0;margin-top:18px;
  }
  .progress{height:8px;background:var(--panel2);border-radius:20px;overflow:hidden;margin-bottom:10px}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0;transition:width .3s}
  .score{font-size:15px}
  .score b{color:var(--ink)}
  .pill{font-size:13px;color:var(--muted)}
  .banner{
    border-radius:12px;padding:16px 18px;margin:6px 0 0;font-weight:600;
  }
  .banner.win{background:var(--good-bg);border:1px solid var(--good);color:#cfeede}
  .banner.again{background:#2a2010;border:1px solid var(--gold);color:#ffe6ad}
  .muted{color:var(--muted)}
  .hide{display:none}
  a{color:var(--accent)}
  .foot{color:var(--muted);font-size:13px;text-align:center;margin-top:30px}
  .round-note{color:var(--gold);font-weight:600;font-size:14px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Midterm 3 — Practice Test</h1>
    <div class="sub">Two exams to choose from. Keep retaking the ones you miss until every answer is correct.</div>
  </div>
</header>

<div class="wrap">

  <!-- Setup -->
  <div class="card" id="setup">
    <div class="row" style="gap:18px;margin-bottom:14px">
      <label class="muted" for="examSel">Exam:</label>
      <select id="examSel">
        <option value="standard">Standard Midterm — 150 MCQ (bones · joints · muscles)</option>
        <option value="functional">Functional Exam — 100 applied physiology Qs</option>
      </select>
    </div>
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <label class="muted" for="sectionSel">Topic:</label>
        <select id="sectionSel"></select>
      </div>
      <div class="row" style="gap:18px">
        <label class="opt-toggle"><input type="checkbox" id="shuffleQ" checked> Shuffle questions</label>
        <label class="opt-toggle"><input type="checkbox" id="shuffleA" checked> Shuffle answers</label>
        <label class="opt-toggle"><input type="checkbox" id="instant" checked> Instant feedback (grade each answer right away)</label>
      </div>
    </div>
    <div class="row" style="margin-top:16px">
      <button id="startBtn">Start test</button>
      <span class="pill" id="startCount"></span>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz" class="hide"></div>

  <!-- Results banner -->
  <div id="resultArea" class="hide"></div>

  <div class="foot">Made for studying · answers auto-graded locally in your browser · refresh to reset.</div>
</div>

<!-- Sticky bottom bar -->
<div class="bar hide" id="bottomBar">
  <div class="wrap">
    <div class="progress"><div id="progFill"></div></div>
    <div class="row" style="justify-content:space-between">
      <div class="score" id="scoreText">Answered <b>0</b> / 0</div>
      <div class="row">
        <button class="ghost" id="resetBtn">Start over</button>
        <button id="submitBtn">Submit &amp; grade</button>
      </div>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script src="functional.js"></script>
<script>
(function(){
  const BANKS = {
    standard: { data: QUESTIONS, label: "All 150",
      sections: [["Bones","Bones (Q1–60)"],["Joints","Joints (Q61–90)"],["Muscles","Muscles (Q91–150)"]] },
    functional: { data: FUNCTIONAL, label: "All 100",
      sections: [["Homeostasis & Chemistry","Homeostasis & Chemistry"],["Cells & Transport","Cells & Transport"],
                 ["Tissues","Tissues"],["Integumentary","Integumentary"],["Bones","Bones"],
                 ["Joints","Joints"],["Muscles","Muscles"],["Nervous System","Nervous System"]] },
  };
  let ALL = QUESTIONS;    // active bank data
  let pool = [];          // current working set (array of question objects, possibly with shuffled option order)
  let round = 1;
  let instant = false;
  let graded = false;

  const $ = s => document.querySelector(s);
  const setupEl   = $("#setup");
  const quizEl    = $("#quiz");
  const barEl     = $("#bottomBar");
  const resultEl  = $("#resultArea");

  function shuffle(a){
    a = a.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  // Build a renderable item from a base question, applying answer shuffle if requested
  function makeItem(q, shuffleA){
    let order = q.options.map((_,i)=>i);
    if(shuffleA) order = shuffle(order);
    return {
      base:q,
      order:order,                          // display index -> original option index
      answerDisp: order.indexOf(q.answer),  // which displayed position is correct
      picked:null,                          // displayed position the user picked
    };
  }

  function populateTopics(){
    const bank = BANKS[$("#examSel").value];
    ALL = bank.data;
    const sel = $("#sectionSel");
    sel.innerHTML = "";
    const optAll = document.createElement("option");
    optAll.value = "all"; optAll.textContent = bank.label;
    sel.appendChild(optAll);
    bank.sections.forEach(([val,lbl])=>{
      const o = document.createElement("option");
      o.value = val;
      o.textContent = lbl + " (" + ALL.filter(q=>q.section===val).length + ")";
      sel.appendChild(o);
    });
    startCount();
  }

  function startCount(){
    const sec = $("#sectionSel").value;
    const n = (sec==="all" || !sec) ? ALL.length : ALL.filter(q=>q.section===sec).length;
    $("#startCount").textContent = n + " questions selected";
  }

  function buildPool(){
    const sec = $("#sectionSel").value;
    let base = sec==="all" ? ALL : ALL.filter(q=>q.section===sec);
    if($("#shuffleQ").checked) base = shuffle(base);
    const sa = $("#shuffleA").checked;
    pool = base.map(q=>makeItem(q, sa));
  }

  const LETTERS = ["A","B","C","D","E","F"];

  function render(){
    quizEl.innerHTML = "";
    if(round>1){
      const note = document.createElement("div");
      note.className = "card";
      note.innerHTML = '<span class="round-note">Round '+round+'</span> &nbsp;<span class="muted">— '+pool.length+' question'+(pool.length===1?'':'s')+' you still need to get right. Nail them all to finish.</span>';
      quizEl.appendChild(note);
    }
    pool.forEach((item, idx)=>{
      const q = item.base;
      const card = document.createElement("div");
      card.className = "q";
      card.id = "q"+idx;

      const head = document.createElement("div");
      head.className = "q-head";
      head.innerHTML = '<span class="q-num">Q'+q.n+'</span><span class="tag">'+q.section+'</span>';
      card.appendChild(head);

      const text = document.createElement("div");
      text.className = "q-text";
      text.textContent = q.text;
      card.appendChild(text);

      const ul = document.createElement("ul");
      ul.className = "choices";
      item.order.forEach((origOpt, dispPos)=>{
        const li = document.createElement("li");
        li.className = "choice";
        li.dataset.pos = dispPos;
        li.innerHTML = '<input type="radio" name="q'+idx+'" value="'+dispPos+'">'+
                       '<span class="letter">'+LETTERS[dispPos]+'</span>'+
                       '<span class="ctext"></span>';
        li.querySelector(".ctext").textContent = q.options[origOpt];
        li.addEventListener("click", ()=>pick(idx, dispPos));
        ul.appendChild(li);
      });
      card.appendChild(ul);

      const v = document.createElement("div");
      v.className = "verdict hide";
      card.appendChild(v);

      quizEl.appendChild(card);
    });
    graded = false;
    updateProgress();
    $("#submitBtn").textContent = instant ? "Finish & see results" : "Submit & grade";
    $("#submitBtn").disabled = false;
  }

  function pick(idx, pos){
    const item = pool[idx];
    if(graded) return;
    if(instant && item.picked!==null) return; // lock after answering in instant mode
    item.picked = pos;
    const card = $("#q"+idx);
    card.querySelectorAll(".choice").forEach(c=>{
      c.classList.toggle("sel", +c.dataset.pos===pos);
    });
    const radio = card.querySelector('input[value="'+pos+'"]');
    if(radio) radio.checked = true;

    if(instant){
      gradeOne(idx);
    }
    updateProgress();
  }

  function gradeOne(idx){
    const item = pool[idx];
    const card = $("#q"+idx);
    const correctPos = item.answerDisp;
    const choices = card.querySelectorAll(".choice");
    choices.forEach(c=>{
      const p = +c.dataset.pos;
      c.classList.remove("sel");
      if(p===correctPos) c.classList.add("correct");
      if(p===item.picked && item.picked!==correctPos) c.classList.add("wrong");
      c.style.cursor = "default";
    });
    const v = card.querySelector(".verdict");
    v.classList.remove("hide");
    if(item.picked===correctPos){
      v.className = "verdict ok";
      v.textContent = "✓ Correct";
    } else {
      v.className = "verdict no";
      const correctOrig = item.base.answer;
      v.textContent = "✗ Incorrect — correct answer: "+LETTERS[correctPos]+") "+item.base.options[correctOrig];
    }
  }

  function answeredCount(){
    return pool.filter(i=>i.picked!==null).length;
  }

  function updateProgress(){
    const ans = answeredCount();
    const total = pool.length;
    $("#scoreText").innerHTML = "Answered <b>"+ans+"</b> / "+total + (round>1?'  ·  Round '+round:'');
    $("#progFill").style.width = (total? (ans/total*100):0)+"%";
  }

  function submit(){
    if(graded) return;
    graded = true;
    let correct = 0;
    const missed = [];
    pool.forEach((item, idx)=>{
      gradeOne(idx);
      if(item.picked===item.answerDisp) correct++;
      else missed.push(item.base);
    });
    $("#submitBtn").disabled = true;
    showResult(correct, pool.length, missed);
    resultEl.scrollIntoView({behavior:"smooth", block:"center"});
  }

  function showResult(correct, total, missed){
    resultEl.classList.remove("hide");
    const pct = Math.round(correct/total*100);
    if(missed.length===0){
      resultEl.innerHTML =
        '<div class="card"><div class="banner win">🎉 Perfect — '+correct+'/'+total+' ('+pct+'%). '+
        'You have answered every question in this set correctly!</div>'+
        '<div class="row" style="margin-top:14px">'+
        '<button id="restartAll">Take it again from scratch</button>'+
        '<span class="pill">Tip: turn on “Shuffle answers” to make sure you know the concept, not the position.</span>'+
        '</div></div>';
      $("#restartAll").addEventListener("click", resetToSetup);
    } else {
      resultEl.innerHTML =
        '<div class="card"><div class="banner again">Round '+round+': '+correct+'/'+total+' correct ('+pct+'%). '+
        'You missed <b>'+missed.length+'</b>. Keep going until you get them all right.</div>'+
        '<div class="row" style="margin-top:14px">'+
        '<button id="retryMissed">Retry the '+missed.length+' I missed →</button>'+
        '<button class="ghost" id="reviewBtn">Review answers above</button>'+
        '<button class="ghost" id="restartAll2">Start over</button>'+
        '</div></div>';
      $("#retryMissed").addEventListener("click", ()=>retry(missed));
      $("#reviewBtn").addEventListener("click", ()=>quizEl.scrollIntoView({behavior:"smooth"}));
      $("#restartAll2").addEventListener("click", resetToSetup);
    }
  }

  function retry(missedBases){
    round++;
    const sa = $("#shuffleA").checked;
    let base = missedBases;
    if($("#shuffleQ").checked) base = shuffle(base);
    pool = base.map(q=>makeItem(q, sa));
    resultEl.classList.add("hide");
    resultEl.innerHTML = "";
    render();
    quizEl.scrollIntoView({behavior:"smooth"});
  }

  function start(){
    round = 1;
    instant = $("#instant").checked;
    buildPool();
    setupEl.classList.add("hide");
    quizEl.classList.remove("hide");
    barEl.classList.remove("hide");
    resultEl.classList.add("hide");
    resultEl.innerHTML = "";
    // in instant mode, the submit button still gives a final tally
    render();
    window.scrollTo({top:0});
  }

  function resetToSetup(){
    round = 1;
    setupEl.classList.remove("hide");
    quizEl.classList.add("hide");
    barEl.classList.add("hide");
    resultEl.classList.add("hide");
    resultEl.innerHTML = "";
    quizEl.innerHTML = "";
    window.scrollTo({top:0});
  }

  $("#startBtn").addEventListener("click", start);
  $("#submitBtn").addEventListener("click", submit);
  $("#resetBtn").addEventListener("click", resetToSetup);
  $("#sectionSel").addEventListener("change", startCount);
  $("#examSel").addEventListener("change", populateTopics);
  populateTopics();
})();
</script>
</body>
</html>
